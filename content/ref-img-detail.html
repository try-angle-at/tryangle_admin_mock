<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>포즈 레퍼런스 이미지 상세</title>
  <link rel="stylesheet" href="../assets/admin.css">
  <style>
    .detail-form {
      padding: 12px;
      display: grid;
      gap: 12px;
    }
    .detail-field {
      display: grid;
      gap: 6px;
    }
    .detail-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .detail-ai-section {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 2px;
      display: grid;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">TryAngle Admin</div>
      <div class="nav-title">데이터 관리</div>
      <ul class="nav-list">
        <li><a href="../realtime/realtime-list.html">실시간 로그 데이터 목록</a></li>
      </ul>
      <div class="nav-title">컨텐츠 관리</div>
      <ul class="nav-list">
        <li><a class="active" href="./ref-img-gallery.html">포즈 레퍼런스 이미지 목록</a></li>
      </ul>
    </aside>

    <main class="main">
      <div class="page-head">
        <div>
          <div style="display:flex; align-items:center; gap:8px;">
            <a href="./ref-img-gallery.html" style="font-size:24px; font-weight:700; color:var(--muted); text-decoration:none;">목록</a>
            <span style="font-size:24px; color:var(--muted);">|</span>
            <h1 style="margin:0;">포즈 레퍼런스 이미지 상세</h1>
          </div>
          <p>메타 데이터(title, desc, tag, bookmark) 관리 화면입니다.</p>
        </div>
        <div class="actions">
          <button class="btn" type="button" style="border-color:#fecaca; color:#b91c1c; background:#fef2f2;">삭제</button>
          <button class="btn primary">저장</button>
        </div>
      </div>

      <div class="preview">
        <div class="panel" style="padding:12px;">
          <div class="thumb" style="overflow:hidden;">
            <img
              src="https://pub-a309ad8a0a6e4a629ad982d710e35276.r2.dev/legacy/hot1.jpg"
              alt="hot1"
              style="width:100%;height:100%;object-fit:cover;display:block;"
            >
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h2>메타 데이터</h2></div>
          <div class="detail-form">
            <div class="detail-field">
              <label class="detail-label" for="titleInput">Title</label>
              <input class="input" id="titleInput" style="width:100%;" value="하이앵글 컵포즈">
            </div>
            <div class="detail-field">
              <label class="detail-label" for="descInput">Description</label>
              <textarea class="input" id="descInput" style="width:100%; min-height:90px;">위에서 아래를 내려다본 하이앵글 구성으로 컵을 강조한 샷</textarea>
            </div>
            <div class="detail-field">
              <label class="detail-label" for="tagsInput">Tags</label>
              <input class="input" id="tagsInput" style="width:100%;" value="#하이앵글, #MZ포즈, #OOTD">
            </div>
            <div class="detail-field">
              <label class="detail-label" for="bookmarkCountInput">북마크 수</label>
              <input class="input" id="bookmarkCountInput" style="width:100%;" type="number" min="0" value="128">
            </div>

            <div class="detail-ai-section">
              <div class="detail-field">
                <label class="detail-label" for="aiJsonFile">AI 데이터(JSON)</label>
                <input class="input" id="aiJsonFile" style="width:100%;" type="file" accept=".json,application/json">
              </div>
              <div style="display:flex; gap:8px; justify-content:flex-end;">
                <button class="btn" id="openAiDataBottom" type="button">AI 데이터 상세 팝업</button>
                <button class="btn primary" id="uploadAiJson" type="button">파일 업로드</button>
              </div>
              <div id="aiJsonFileName" style="font-size:12px; color:var(--muted);">선택된 파일 없음</div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- iframe 팝업 오버레이 -->
  <div id="posePopupOverlay" style="
    display:none; position:fixed; inset:0; z-index:9999;
    background:rgba(0,0,0,0.72); backdrop-filter:blur(4px);
    align-items:center; justify-content:center;">
    <div style="
      position:relative; width:92vw; height:92vh; max-width:1400px;
      border-radius:12px; overflow:hidden; box-shadow:0 24px 80px rgba(0,0,0,0.6);">
      <iframe id="posePopupFrame" src="" style="width:100%;height:100%;border:none;display:block;"></iframe>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('posePopupOverlay');
    const frame   = document.getElementById('posePopupFrame');

    document.getElementById('openAiDataBottom').addEventListener('click', () => {
      frame.src = './ref-img-detail-pose.html';
      overlay.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    });

    function closePopup() {
      overlay.style.display = 'none';
      frame.src = '';
      document.body.style.overflow = '';
    }

    overlay.addEventListener('click', (e) => { if (e.target === overlay) closePopup(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePopup(); });

    window.addEventListener('message', (e) => {
      if (e?.data?.type === 'close-pose-popup') closePopup();
    });

    const aiJsonFileInput = document.getElementById('aiJsonFile');
    const aiJsonFileName = document.getElementById('aiJsonFileName');
    const uploadAiJsonBtn = document.getElementById('uploadAiJson');

    aiJsonFileInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      aiJsonFileName.textContent = file ? `선택 파일: ${file.name}` : '선택된 파일 없음';
    });

    uploadAiJsonBtn.addEventListener('click', () => {
      const file = aiJsonFileInput.files?.[0];
      if (!file) {
        aiJsonFileName.textContent = '업로드할 JSON 파일을 선택해주세요.';
        return;
      }
      aiJsonFileName.textContent = `업로드 준비 완료: ${file.name}`;
    });
  </script>
</body>
</html>
