<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>레퍼런스 이미지 관리</title>
  <link rel="stylesheet" href="../assets/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
  <style>
    .detail-form {
      padding: 12px;
      display: grid;
      gap: 12px;
    }
    .detail-field {
      display: grid;
      gap: 6px;
    }
    .detail-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .detail-ai-section {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 2px;
      display: grid;
      gap: 12px;
    }
    .detail-db-section {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 2px;
      display: grid;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand" style="display:flex;align-items:center;gap:8px;">
        <span class="icon">dashboard_customize</span>
        TryAngle Admin
      </div>
      <div class="nav-title">메인</div>
      <ul class="nav-list">
        <li><a href="../index.html"><span class="icon sm" style="margin-right:8px;">grid_view</span>대시보드</a></li>
      </ul>
      <div class="nav-title">데이터 관리</div>
      <ul class="nav-list">
        <li><a href="../realtime/realtime-list.html"><span class="icon sm" style="margin-right:8px;">analytics</span>실시간 로그 데이터 목록</a></li>
      </ul>
      <div class="nav-title">컨텐츠 관리</div>
      <ul class="nav-list">
        <li><a class="active" href="./ref-img-gallery.html"><span class="icon sm" style="margin-right:8px;">image</span>레퍼런스 이미지 관리</a></li>
        <li><a href="./prod-list.html"><span class="icon sm" style="margin-right:8px;">shopping_bag</span>상품 관리</a></li>
        <li><a href="./snap-list.html"><span class="icon sm" style="margin-right:8px;">photo_library</span>후기 사진 관리</a></li>
      </ul>
    </aside>

    <main class="main">
      <div class="page-head">
        <div>
          <div class="breadcrumb-head">
            <a href="./ref-img-gallery.html" class="breadcrumb-link">목록</a>
            <span class="breadcrumb-sep">|</span>
            <h1>레퍼런스 이미지 관리</h1>
          </div>
        </div>
        <div class="actions">
          <button class="btn danger" type="button"><span class="icon sm" style="margin-right:6px;">delete</span>삭제</button>
          <button class="btn primary"><span class="icon sm" style="margin-right:6px;">save</span>저장</button>
        </div>
      </div>

      <div class="preview">
        <div class="panel" style="padding:12px; align-self:start;">
          <div class="thumb" style="overflow:hidden;">
            <img
              id="detailPreviewImage"
              class="thumb-cover"
              src="https://pub-a309ad8a0a6e4a629ad982d710e35276.r2.dev/legacy/ref/fullshot_1.jpg"
              alt="fullshot_1"
            >
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h2>메타 데이터</h2></div>
          <div class="detail-form">
            <div class="detail-field">
              <label class="detail-label" for="titleInput">Title</label>
              <input class="input full" id="titleInput">
            </div>
            <div class="detail-field">
              <label class="detail-label" for="descInput">Description</label>
              <textarea class="input full" id="descInput" rows="3" style="resize:none;"></textarea>
            </div>
            <div class="detail-field">
              <label class="detail-label" for="tagsInput">Tags</label>
              <input class="input full" id="tagsInput">
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
              <div class="detail-field">
                <label class="detail-label" for="bookmarkCountInput">북마크 수</label>
                <input class="input full" id="bookmarkCountInput" type="number" min="0">
              </div>
              <div class="detail-field">
                <label class="detail-label" for="useCntInput">사용횟수</label>
                <input class="input full" id="useCntInput" type="number" min="0">
              </div>
            </div>

            <div class="detail-db-section">
              <div class="detail-field">
                <label class="detail-label" for="expWeightInput">노출 가중치</label>
                <input class="input full" id="expWeightInput" type="number" step="0.01" min="0">
              </div>
              <div class="detail-field">
                <label class="detail-label" for="priorityInput">우선순위</label>
                <input class="input full" id="priorityInput" type="number" min="0">
              </div>
            </div>

            <div class="detail-db-section">
              <div class="detail-field">
                <label class="detail-label" for="fileSizeInput">파일 크기</label>
                <input class="input full" id="fileSizeInput" readonly>
              </div>
              <div class="detail-field">
                <label class="detail-label" for="uploadedAtInput">업로드 일시</label>
                <input class="input full" id="uploadedAtInput" readonly>
              </div>
            </div>

            <div class="detail-ai-section">
              <div class="detail-field">
                <label class="detail-label" for="aiJsonFile">AI 데이터(JSON)</label>
                <input class="input full" id="aiJsonFile" type="file" accept=".json,application/json">
              </div>
              <div style="display:flex; gap:8px; justify-content:flex-end;">
                <button class="btn" id="openAiDataBottom" type="button"><span class="icon sm" style="margin-right:6px;">open_in_new</span>AI 데이터 상세 팝업</button>
                <button class="btn primary" id="uploadAiJson" type="button"><span class="icon sm" style="margin-right:6px;">upload_file</span>파일 업로드</button>
              </div>
              <div id="aiJsonFileName" style="font-size:12px; color:var(--muted);">선택된 파일 없음</div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <div id="posePopupOverlay" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(17,17,17,0.72); backdrop-filter:blur(4px); align-items:center; justify-content:center;">
    <div style="position:relative; width:92vw; height:92vh; max-width:1400px; border-radius:12px; overflow:hidden; box-shadow:0 24px 80px rgba(0,0,0,0.6);">
      <iframe id="posePopupFrame" src="" style="width:100%;height:100%;border:none;display:block;"></iframe>
    </div>
  </div>

  <script src="../assets/data/reference.json.js"></script>
  <script>
    const LEGACY_BASE_URL = 'https://pub-a309ad8a0a6e4a629ad982d710e35276.r2.dev/legacy/ref/';
    const REFERENCE_JSON_PATH = '../assets/data/reference.json';
    const DEFAULT_IMAGE_FILE = 'fullshot_1.jpg';
    const DEFAULT_REFERENCE_META = {
      title: '',
      description: '',
      tagsText: '',
      bookmarkCount: 0,
      useCnt: 0,
      expWeight: 0,
      priority: 0,
      mime: 'image/jpeg',
      storageClass: 'Standard',
      size: '-',
      uploadedAt: '-'
    };

    async function loadReferenceMetaMap() {
      try {
        const res = await fetch(REFERENCE_JSON_PATH, { cache: 'no-store' });
        if (!res.ok) throw new Error(`Failed to load reference.json: ${res.status}`);
        const json = await res.json();
        const refs = Array.isArray(json?.references) ? json.references : [];
        return refs.reduce((acc, ref) => {
          if (ref?.fileName) acc[ref.fileName] = ref;
          return acc;
        }, {});
      } catch (e) {
        console.warn('reference.json fetch 실패, script fallback 사용 시도', e);
        const refs = Array.isArray(window.__REFERENCE_DATA__?.references) ? window.__REFERENCE_DATA__.references : [];
        return refs.reduce((acc, ref) => {
          if (ref?.fileName) acc[ref.fileName] = ref;
          return acc;
        }, {});
      }
    }

    function resolveImageFile() {
      try {
        const raw = new URLSearchParams(window.location.search).get('img');
        const value = (raw || '').trim();
        if (!value) return DEFAULT_IMAGE_FILE;
        if (!/^[a-zA-Z0-9._-]+\.(jpg|jpeg|png|webp)$/i.test(value)) return DEFAULT_IMAGE_FILE;
        return value;
      } catch (_) {
        return DEFAULT_IMAGE_FILE;
      }
    }

    const selectedImageFile = resolveImageFile();

    async function initDetail() {
      const metaMap = await loadReferenceMetaMap();
      const selectedMeta = metaMap[selectedImageFile] || DEFAULT_REFERENCE_META;

      const previewImage = document.getElementById('detailPreviewImage');
      if (previewImage) {
        previewImage.src = `${LEGACY_BASE_URL}${selectedImageFile}`;
        previewImage.alt = selectedImageFile.replace(/\.[^.]+$/, '');
      }

      const titleInput = document.getElementById('titleInput');
      const descInput = document.getElementById('descInput');
      const tagsInput = document.getElementById('tagsInput');
      const bookmarkCountInput = document.getElementById('bookmarkCountInput');
      const useCntInput = document.getElementById('useCntInput');
      const expWeightInput = document.getElementById('expWeightInput');
      const priorityInput = document.getElementById('priorityInput');
      const fileSizeInput = document.getElementById('fileSizeInput');
      const uploadedAtInput = document.getElementById('uploadedAtInput');

      if (titleInput) titleInput.value = selectedMeta.title || selectedImageFile;
      if (descInput) descInput.value = selectedMeta.description || '';
      if (tagsInput) {
        tagsInput.value = selectedMeta.tagsText || (Array.isArray(selectedMeta.tags) ? selectedMeta.tags.map((tag) => `#${tag}`).join(', ') : '');
      }
      if (bookmarkCountInput) bookmarkCountInput.value = selectedMeta.bookmarkCount ?? 0;
      if (useCntInput) useCntInput.value = selectedMeta.useCnt ?? 0;
      if (expWeightInput) expWeightInput.value = selectedMeta.expWeight ?? 0;
      if (priorityInput) priorityInput.value = selectedMeta.priority ?? 0;
      if (fileSizeInput) fileSizeInput.value = selectedMeta.size || '-';
      if (uploadedAtInput) uploadedAtInput.value = selectedMeta.uploadedAt || '-';
    }

    initDetail();

    const overlay = document.getElementById('posePopupOverlay');
    const frame = document.getElementById('posePopupFrame');

    document.getElementById('openAiDataBottom').addEventListener('click', () => {
      frame.src = `./ref-img-detail-pose.html?img=${encodeURIComponent(selectedImageFile)}`;
      overlay.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    });

    function closePopup() {
      overlay.style.display = 'none';
      frame.src = '';
      document.body.style.overflow = '';
    }

    overlay.addEventListener('click', (e) => { if (e.target === overlay) closePopup(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePopup(); });

    window.addEventListener('message', (e) => {
      if (e?.data?.type === 'close-pose-popup') closePopup();
    });

    const aiJsonFileInput = document.getElementById('aiJsonFile');
    const aiJsonFileName = document.getElementById('aiJsonFileName');
    const uploadAiJsonBtn = document.getElementById('uploadAiJson');

    aiJsonFileInput.addEventListener('change', (e) => {
      const file = e.target.files?.[0];
      aiJsonFileName.textContent = file ? `선택 파일: ${file.name}` : '선택된 파일 없음';
    });

    uploadAiJsonBtn.addEventListener('click', () => {
      const file = aiJsonFileInput.files?.[0];
      if (!file) {
        aiJsonFileName.textContent = '업로드할 JSON 파일을 선택해주세요.';
        return;
      }
      aiJsonFileName.textContent = `업로드 준비 완료: ${file.name}`;
    });
  </script>
</body>
</html>
