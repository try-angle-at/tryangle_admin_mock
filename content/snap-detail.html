<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>후기 사진 상세</title>
  <link rel="stylesheet" href="../assets/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
  <style>
    .detail-form {
      padding: 12px;
      display: grid;
      gap: 12px;
    }
    .detail-field {
      display: grid;
      gap: 6px;
    }
    .detail-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .used-ref-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      display: grid;
      gap: 6px;
      background: var(--panel-bg);
    }
    .used-ref-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .used-ref-thumb-wrap {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: #efefef;
      flex-shrink: 0;
    }
    .used-ref-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .used-ref-name {
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
      word-break: break-all;
    }
    .used-ref-sub {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand" style="display:flex;align-items:center;gap:8px;">
        <span class="icon">triangle_circle</span>
        TryAngle Admin
      </div>
      <div class="nav-title">메인</div>
      <ul class="nav-list">
        <li><a href="../index.html"><span class="icon sm" style="margin-right:8px;">grid_view</span>대시보드</a></li>
      </ul>
      <div class="nav-title">데이터 관리</div>
      <ul class="nav-list">
        <li><a href="../realtime/realtime-list.html"><span class="icon sm" style="margin-right:8px;">analytics</span>실시간 로그 데이터 목록</a></li>
      </ul>
      <div class="nav-title">컨텐츠 관리</div>
      <ul class="nav-list">
        <li><a href="./ref-img-gallery.html"><span class="icon sm" style="margin-right:8px;">image</span>레퍼런스 이미지 관리</a></li>
        <li><a href="./prod-list.html"><span class="icon sm" style="margin-right:8px;">shopping_bag</span>상품 관리</a></li>
        <li><a class="active" href="./snap-list.html"><span class="icon sm" style="margin-right:8px;">photo_library</span>후기 사진 관리</a></li>
      </ul>
    </aside>

    <main class="main">
    <!-- 수정된 page-head detail 섹션 -->
      <div class="page-head detail" style="padding-bottom: 20px; border-bottom: 1px solid var(--line); margin-bottom: 24px;">
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: flex-end;">
          <div style="flex: 1;">
            <!-- 상단 경로 내비게이션 -->
            <nav class="page-crumb" aria-label="경로" style="margin-bottom: 12px; font-size: 13px; color: var(--muted);">
              <a href="./snap-list.html" style="text-decoration: none; color: inherit;">후기 사진 관리</a>
              <span class="page-crumb-sep" style="margin: 0 4px;">/</span>
              <span style="color: var(--text);">후기 사진 상세</span>
            </nav>
            
            <!-- 뒤로가기(테두리 없음) 및 파일명 제목 -->
            <div class="page-title-row" style="display: flex; align-items: center; gap: 8px;">
              <button class="btn-back" type="button" onclick="history.back()" aria-label="뒤로가기" 
                      style="display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; padding: 0;">
                <span class="icon" style="font-size: 24px; color: var(--text);">arrow_back</span>
              </button>
              <!-- 파일명이 동적으로 들어갈 자리 -->
              <h1 id="titleFileName" style="font-size: 22px; font-weight: 700; margin: 0; color: var(--text);">불러오는 중...</h1>
            </div>
          </div>

          <!-- 네비게이션 하단/우측 수정 버튼 -->
          <div class="page-actions">
            <button class="btn primary" type="button" onclick="location.href='#'">
               <span class="icon sm" style="margin-right: 6px;">save</span>저장하기
            </button>
          </div>
        </div>
      </div>

      <div class="preview">
        <div class="panel" style="padding:12px; align-self:start;">
          <div class="thumb" style="overflow:hidden; min-height:380px;">
            <img id="detailPreviewImage" class="thumb-cover" src="" alt="snap image">
          </div>
        </div>

        <div class="panel">
          <div class="panel-head"><h2>snap 메타데이터</h2></div>
          <div class="detail-form">
            <div class="detail-field">
              <label class="detail-label" for="fileNameInput">파일명</label>
              <input class="input full" id="fileNameInput" readonly>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
              <div class="detail-field">
                <label class="detail-label" for="idInput">id</label>
                <input class="input full" id="idInput" readonly>
              </div>
              <div class="detail-field">
                <label class="detail-label" for="sIdInput">sId (session)</label>
                <input class="input full" id="sIdInput" readonly>
              </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
              <div class="detail-field">
                <label class="detail-label" for="userIdInput">userId</label>
                <input class="input full" id="userIdInput" readonly>
              </div>
              <div class="detail-field">
                <label class="detail-label" for="prodIdInput">prodId</label>
                <input class="input full" id="prodIdInput" readonly>
              </div>
              <div class="detail-field">
                <label class="detail-label" for="imgIdInput">imgId</label>
                <input class="input full" id="imgIdInput" readonly>
              </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
              <div class="detail-field">
                <label class="detail-label" for="mimeInput">MIME</label>
                <input class="input full" id="mimeInput" readonly>
              </div>
              <div class="detail-field">
                <label class="detail-label" for="storageClassInput">Storage Class</label>
                <input class="input full" id="storageClassInput" readonly>
              </div>
              <div class="detail-field">
                <label class="detail-label" for="sizeInput">파일 크기</label>
                <input class="input full" id="sizeInput" readonly>
              </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
              <div class="detail-field">
                <label class="detail-label" for="uploadedAtInput">업로드 시간</label>
                <input class="input full" id="uploadedAtInput" readonly>
              </div>
              <div class="detail-field">
                <label class="detail-label" for="viewCntInput">조회수</label>
                <input class="input full" id="viewCntInput" readonly>
              </div>
            </div>
            <div class="detail-field">
              <label class="detail-label" for="urlInput">snapUrl</label>
              <input class="input full" id="urlInput" readonly>
            </div>

            <div class="detail-field" style="border-top:1px solid var(--line); padding-top:12px; margin-top:2px;">
              <label class="detail-label">사용 레퍼런스 이미지</label>
              <div id="usedReferenceWrap"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../assets/data/snaps.json.js"></script>
  <script src="../assets/data/reference.json.js"></script>
  <script>
    const SNAPS_JSON_PATH = '../assets/data/snaps.json';
    const REFERENCE_JSON_PATH = '../assets/data/reference.json';
    const DEFAULT_SNAP_FILE = 'snap_142_1714859210.png';

    function sanitizeSnapFile(value) {
      const normalized = String(value || '').trim();
      if (!normalized) return DEFAULT_SNAP_FILE;
      if (!/^[a-zA-Z0-9._-]+\.(jpg|jpeg|png|webp)$/i.test(normalized)) return DEFAULT_SNAP_FILE;
      return normalized;
    }

    function getSelectedFile() {
      try {
        const raw = new URLSearchParams(window.location.search).get('snap');
        return sanitizeSnapFile(raw);
      } catch (_) {
        return DEFAULT_SNAP_FILE;
      }
    }

    async function loadSnaps() {
      try {
        const res = await fetch(SNAPS_JSON_PATH, { cache: 'no-store' });
        if (!res.ok) throw new Error(`Failed to load snaps.json: ${res.status}`);
        const json = await res.json();
        return Array.isArray(json?.snaps) ? json.snaps : [];
      } catch (e) {
        console.warn('snaps.json fetch 실패, script fallback 사용 시도', e);
        return Array.isArray(window.__SNAPS_DATA__?.snaps) ? window.__SNAPS_DATA__.snaps : [];
      }
    }

    async function loadReferenceMap() {
      try {
        const res = await fetch(REFERENCE_JSON_PATH, { cache: 'no-store' });
        if (!res.ok) throw new Error(`Failed to load reference.json: ${res.status}`);
        const json = await res.json();
        const refs = Array.isArray(json?.references) ? json.references : [];
        return refs.reduce((acc, ref) => {
          if (ref?.fileName) acc[ref.fileName] = ref;
          return acc;
        }, {});
      } catch (e) {
        console.warn('reference.json fetch 실패, script fallback 사용 시도', e);
        const refs = Array.isArray(window.__REFERENCE_DATA__?.references) ? window.__REFERENCE_DATA__.references : [];
        return refs.reduce((acc, ref) => {
          if (ref?.fileName) acc[ref.fileName] = ref;
          return acc;
        }, {});
      }
    }

    function setValue(id, value) {
      const el = document.getElementById(id);
      if (el) el.value = String(value ?? '-');
    }

    function renderUsedReference(data, referenceMap) {
      const wrap = document.getElementById('usedReferenceWrap');
      if (!wrap) return;

      const refFileName = String(data?.referenceFileName || '').trim();
      if (!refFileName) {
        wrap.innerHTML = '<div class="used-ref-sub">이 snap에 연결된 레퍼런스 정보가 없습니다.</div>';
        return;
      }

      const ref = referenceMap[refFileName];
      if (!ref) {
        wrap.innerHTML = `
          <div class="used-ref-card">
            <div class="used-ref-name">${refFileName}</div>
            <div class="used-ref-sub">reference.json에서 해당 파일을 찾을 수 없습니다.</div>
          </div>
        `;
        return;
      }

      const href = `./ref-img-detail.html?img=${encodeURIComponent(ref.fileName)}`;
      const tags = ref.tagsText || (Array.isArray(ref.tags) ? ref.tags.map((tag) => `#${tag}`).join(', ') : '-');
      const refThumbUrl = ref.url || '';

      wrap.innerHTML = `
        <div class="used-ref-card">
          <div class="used-ref-top">
            <div class="used-ref-thumb-wrap">
              <img class="used-ref-thumb" src="${refThumbUrl}" alt="${ref.fileName}">
            </div>
            <div class="used-ref-name">${ref.fileName}</div>
          </div>
          <div class="used-ref-sub">제목: ${ref.title || '-'}</div>
          <div class="used-ref-sub">태그: ${tags || '-'}</div>
          <div><a class="btn" href="${href}"><span class="icon sm" style="margin-right:6px;">open_in_new</span>레퍼런스 상세 보기</a></div>
        </div>
      `;
    }

    async function initSnapDetail() {
      const selectedFile = getSelectedFile();
      const [snaps, referenceMap] = await Promise.all([loadSnaps(), loadReferenceMap()]);
      const fallback = snaps[0] || {};
      const data = snaps.find((item) => item.fileName === selectedFile) || fallback;

      const preview = document.getElementById('detailPreviewImage');
      const openOriginalBtn = document.getElementById('openOriginalBtn');
      const previewUrl = data.snapUrl || '';

      // 제목을 파일명으로 변경 (추가된 부분)
      const titleEl = document.getElementById('titleFileName');
      if (titleEl) titleEl.textContent = data.fileName || '상세 정보';

      setValue('fileNameInput', data.fileName || '-');

      if (preview) {
        preview.src = previewUrl;
        preview.alt = data.fileName || 'snap image';
      }

      setValue('fileNameInput', data.fileName || '-');
      setValue('idInput', data.id);
      setValue('sIdInput', data.sId);
      setValue('userIdInput', data.userId);
      setValue('prodIdInput', data.prodId);
      setValue('imgIdInput', data.imgId);
      setValue('mimeInput', data.mime || '-');
      setValue('storageClassInput', data.storageClass || '-');
      setValue('sizeInput', data.size || '-');
      setValue('uploadedAtInput', data.uploadedAt || '-');
      setValue('viewCntInput', data.viewCnt ?? 0);
      setValue('urlInput', previewUrl || '-');
      renderUsedReference(data, referenceMap);

      if (openOriginalBtn) {
        openOriginalBtn.addEventListener('click', () => {
          if (!previewUrl) return;
          window.open(previewUrl, '_blank', 'noopener,noreferrer');
        });
      }
    }

    initSnapDetail();
  </script>
</body>
</html>
