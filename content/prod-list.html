<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>상품 관리</title>
  <link rel="stylesheet" href="../assets/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand" style="display:flex;align-items:center;gap:8px;">
        <span class="icon">dashboard_customize</span>
        TryAngle Admin
      </div>
      <div class="nav-title">메인</div>
      <ul class="nav-list">
        <li><a href="../index.html"><span class="icon sm" style="margin-right:8px;">grid_view</span>대시보드</a></li>
      </ul>
      <div class="nav-title">데이터 관리</div>
      <ul class="nav-list">
        <li><a href="../realtime/realtime-list.html"><span class="icon sm" style="margin-right:8px;">analytics</span>실시간 로그 데이터 목록</a></li>
      </ul>
      <div class="nav-title">컨텐츠 관리</div>
      <ul class="nav-list">
        <li><a href="./ref-img-gallery.html"><span class="icon sm" style="margin-right:8px;">image</span>레퍼런스 이미지 관리</a></li>
        <li><a class="active" href="./prod-list.html"><span class="icon sm" style="margin-right:8px;">shopping_bag</span>상품 관리</a></li>
        <li><a href="./snap-list.html"><span class="icon sm" style="margin-right:8px;">photo_library</span>후기 사진 관리</a></li>
      </ul>
    </aside>

    <main class="main">
      <div class="page-head">
        <div>
          <h1>상품 관리</h1>
        </div>
        <div class="actions">
          <button class="btn primary" type="button"><span class="icon sm" style="margin-right:6px;">add</span>상품 등록</button>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <div class="label">전체 상품</div>
          <div id="kpiTotal" class="value">-</div>
        </div>
        <div class="card">
          <div class="label">판매 중</div>
          <div id="kpiActive" class="value">-</div>
        </div>
        <div class="card">
          <div class="label">품절</div>
          <div id="kpiSoldOut" class="value">-</div>
        </div>
        <div class="card">
          <div class="label">비활성</div>
          <div id="kpiInactive" class="value">-</div>
        </div>
      </div>

      <div class="toolbar" style="margin-bottom:16px;">
        <div class="toolbar-group" style="flex:1;">
          <input id="productSearchInput" class="input" type="text" placeholder="상품명 검색" style="min-width:280px;">
          <select id="productStatusFilter" class="input" aria-label="상태 필터">
            <option>전체 상태</option>
            <option>판매 중</option>
            <option>품절</option>
            <option>비활성</option>
          </select>
        </div>
        <div class="toolbar-group">
          <button id="productResetBtn" class="btn" type="button">초기화</button>
          <button id="productSearchBtn" class="btn" type="button">검색</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>상품 목록</h2>
        </div>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>썸네일</th>
              <th>상품명</th>
              <th>가격</th>
              <th>등록자</th>
              <th>등록일</th>
              <th>상태</th>
              <th>상세</th>
            </tr>
          </thead>
          <tbody id="productTableBody"></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../assets/data/products.json.js"></script>
  <script>
    const PRODUCTS_JSON_PATH = '../assets/data/products.json';
    const STATUS_TO_LABEL = {
      '활성': '판매 중',
      '품절': '품절',
      '비활성': '비활성'
    };

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getStatusBadge(status) {
      if (status === '품절') return 'warn';
      if (status === '비활성') return 'default';
      return 'success';
    }

    function updateKpi(products) {
      const total = products.length;
      const active = products.filter((p) => p.status === '활성').length;
      const soldOut = products.filter((p) => p.status === '품절').length;
      const inactive = products.filter((p) => p.status === '비활성').length;
      document.getElementById('kpiTotal').textContent = String(total);
      document.getElementById('kpiActive').textContent = String(active);
      document.getElementById('kpiSoldOut').textContent = String(soldOut);
      document.getElementById('kpiInactive').textContent = String(inactive);
    }

    function renderRows(products) {
      const tbody = document.getElementById('productTableBody');
      if (!tbody) return;
      if (!products.length) {
        tbody.innerHTML = '<tr><td colspan="8" style="color:var(--muted);">검색 결과가 없습니다.</td></tr>';
        return;
      }

      tbody.innerHTML = products.map((p) => {
        const fileName = p.fileName || '';
        const thumbUrl = p.thumbUrl || '';
        const detailHref = `./prod-detail.html?prod=${encodeURIComponent(fileName)}`;
        const statusClass = getStatusBadge(p.status);
        const statusText = STATUS_TO_LABEL[p.status] || p.status || '-';

        return `
          <tr>
            <td>${escapeHtml(p.id)}</td>
            <td>
              <div style="width:48px;height:48px;border-radius:6px;overflow:hidden;background:#efefef;">
                ${thumbUrl ? `<img style="width:100%;height:100%;object-fit:cover;" src="${escapeHtml(thumbUrl)}" alt="${escapeHtml(fileName)}">` : ''}
              </div>
            </td>
            <td><a href="${detailHref}">${escapeHtml(p.name)}</a><br><small style="color:var(--muted);">${escapeHtml(p.brand || '-')}</small></td>
            <td>${escapeHtml(p.priceText || `${p.price ?? 0}원`)}</td>
            <td>${escapeHtml(p.owner || '-')}</td>
            <td>${escapeHtml(p.registeredAt || '-')}</td>
            <td><span class="badge ${statusClass}">${escapeHtml(statusText)}</span></td>
            <td><a class="btn" href="${detailHref}">상세보기</a></td>
          </tr>
        `;
      }).join('');
    }

    async function loadProducts() {
      try {
        const res = await fetch(PRODUCTS_JSON_PATH, { cache: 'no-store' });
        if (!res.ok) throw new Error(`Failed to load products.json: ${res.status}`);
        const json = await res.json();
        return Array.isArray(json?.products) ? json.products : [];
      } catch (e) {
        console.warn('products.json fetch 실패, script fallback 사용 시도', e);
        const fallback = window.__PRODUCTS_DATA__;
        return Array.isArray(fallback?.products) ? fallback.products : [];
      }
    }

    async function initProductList() {
      const searchInput = document.getElementById('productSearchInput');
      const statusFilter = document.getElementById('productStatusFilter');
      const allProducts = await loadProducts();
      updateKpi(allProducts);

      const filterAndRender = () => {
        const q = (searchInput?.value || '').trim().toLowerCase();
        const status = (statusFilter?.value || '전체 상태').trim();
        const filtered = allProducts.filter((p) => {
          const matchesQuery = !q
            || (p.name || '').toLowerCase().includes(q)
            || (p.brand || '').toLowerCase().includes(q)
            || (p.fileName || '').toLowerCase().includes(q);
          const label = STATUS_TO_LABEL[p.status] || p.status;
          const matchesStatus = status === '전체 상태' || label === status;
          return matchesQuery && matchesStatus;
        });
        renderRows(filtered);
      };

      const resetBtn = document.getElementById('productResetBtn');
      const searchBtn = document.getElementById('productSearchBtn');

      if (searchInput) {
        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') filterAndRender(); });
      }
      if (statusFilter) statusFilter.addEventListener('change', filterAndRender);
      if (searchBtn) searchBtn.addEventListener('click', filterAndRender);
      if (resetBtn) {
        resetBtn.addEventListener('click', () => {
          if (searchInput) searchInput.value = '';
          if (statusFilter) statusFilter.value = '전체 상태';
          filterAndRender();
        });
      }
      filterAndRender();
    }

    initProductList();
  </script>
</body>
</html>
