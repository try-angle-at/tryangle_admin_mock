<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>상품 관리</title>
  <link rel="stylesheet" href="../assets/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
  <style>
    .detail-form {
      padding: 12px;
      display: grid;
      gap: 12px;
    }
    .detail-field {
      display: grid;
      gap: 6px;
    }
    .detail-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .detail-db-section {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 2px;
      display: grid;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand" style="display:flex;align-items:center;gap:8px;">
        <span class="icon">triangle_circle</span>
        TryAngle Admin
      </div>
      <div class="nav-title">메인</div>
      <ul class="nav-list">
        <li><a href="../index.html"><span class="icon sm" style="margin-right:8px;">grid_view</span>대시보드</a></li>
      </ul>
      <div class="nav-title">데이터 관리</div>
      <ul class="nav-list">
        <li><a href="../realtime/realtime-list.html"><span class="icon sm" style="margin-right:8px;">analytics</span>실시간 로그 데이터 목록</a></li>
      </ul>
      <div class="nav-title">컨텐츠 관리</div>
      <ul class="nav-list">
        <li><a href="./ref-img-gallery.html"><span class="icon sm" style="margin-right:8px;">image</span>레퍼런스 이미지 관리</a></li>
        <li><a class="active" href="./prod-list.html"><span class="icon sm" style="margin-right:8px;">shopping_bag</span>상품 관리</a></li>
        <li><a href="./snap-list.html"><span class="icon sm" style="margin-right:8px;">photo_library</span>후기 사진 관리</a></li>
      </ul>
    </aside>

    <main class="main">
<!-- 수정된 상품 상세 page-head 섹션 -->
      <div class="page-head detail" style="padding-bottom: 20px; border-bottom: 1px solid var(--line); margin-bottom: 24px;">
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: flex-end;">
          <div style="flex: 1;">
            <!-- 상단 경로 내비게이션 -->
            <nav class="page-crumb" aria-label="경로" style="margin-bottom: 12px; font-size: 13px; color: var(--muted);">
              <a href="./prod-list.html" style="text-decoration: none; color: inherit;">상품 관리</a>
              <span class="page-crumb-sep" style="margin: 0 4px;">/</span>
              <span style="color: var(--text);">상품 상세</span>
            </nav>
            
            <!-- 뒤로가기(테두리 없음) 및 상품명 제목 -->
            <div class="page-title-row" style="display: flex; align-items: center; gap: 8px;">
              <button class="btn-back" type="button" onclick="history.back()" aria-label="뒤로가기" 
                      style="display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border: none; background: transparent; cursor: pointer; padding: 0;">
                <span class="icon" style="font-size: 24px; color: var(--text);">arrow_back</span>
              </button>
              <!-- DATABASE.md의 tb_prod.name이 동적으로 들어갈 자리 -->
              <h1 id="titleProdName" style="font-size: 22px; font-weight: 700; margin: 0; color: var(--text);">상품 상세</h1>
            </div>
          </div>

          <!-- 액션 버튼 그룹 -->
          <div class="actions" style="display: flex; gap: 8px;">
            <button class="btn danger" type="button">
              <span class="icon sm" style="margin-right: 6px;">delete</span>삭제
            </button>
            <button class="btn primary" type="submit">
              <span class="icon sm" style="margin-right: 6px;">save</span>저장하기
            </button>
          </div>
        </div>
      </div>

      <div class="preview" style="grid-template-columns:1fr;">
        <div class="panel">
          <div class="panel-head"><h2>상품 정보</h2></div>
          <div class="detail-form">
            <div class="detail-field">
              <label class="detail-label" for="nameInput">상품명</label>
              <input class="input full" id="nameInput">
            </div>
            <div class="detail-field">
              <label class="detail-label" for="brandInput">브랜드</label>
              <input class="input full" id="brandInput">
            </div>
            <div class="detail-field">
              <label class="detail-label" for="priceInput">가격</label>
              <input class="input full" id="priceInput" type="number" min="0">
            </div>
            <div class="detail-field">
              <label class="detail-label" for="pStatInput">상태</label>
              <select class="input full" id="pStatInput">
                <option value="0">비활성</option>
                <option value="1" selected>활성</option>
                <option value="2">품절</option>
              </select>
            </div>

            <div class="detail-db-section">
              <div class="detail-field">
                <label class="detail-label">썸네일</label>
                <div style="display:flex; align-items:center; gap:10px;">
                  <div id="thumbPreviewWrap" style="width:72px;height:72px;border-radius:8px;overflow:hidden;background:#efefef;flex-shrink:0;">
                    <img id="thumbPreview" style="width:100%;height:100%;object-fit:cover;" src="" alt="썸네일">
                  </div>
                  <div style="display:flex;flex-direction:column;gap:6px;flex:1;">
                    <input class="input full" id="thumbFileInput" type="file" accept="image/*">
                    <div id="thumbFileName" style="font-size:12px;color:var(--muted);">&#xb4f1;&#xb85d;&#xb41c; 파일 없음</div>
                  </div>
                </div>
              </div>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="detail-field">
                  <label class="detail-label" for="fileSizeInput">파일 크기</label>
                  <input class="input full" id="fileSizeInput" readonly>
                </div>
                <div class="detail-field">
                  <label class="detail-label" for="uploadedAtInput">업로드 일시</label>
                  <input class="input full" id="uploadedAtInput" readonly>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script src="../assets/data/products.json.js"></script>
  <script>
    const PRODUCTS_JSON_PATH = '../assets/data/products.json';
    const DEFAULT_PROD_FILE = '1623540_3_big.webp';
    const DEFAULT_PRODUCT_META = {
      name: '',
      brand: '',
      price: 0,
      status: '활성',
      fileName: '',
      thumbUrl: '',
      size: '-',
      uploadedAt: '-'
    };

    async function loadProductMap() {
      try {
        const res = await fetch(PRODUCTS_JSON_PATH, { cache: 'no-store' });
        if (!res.ok) throw new Error(`Failed to load products.json: ${res.status}`);
        const json = await res.json();
        const products = Array.isArray(json?.products) ? json.products : [];
        return products.reduce((acc, p) => {
          if (p?.fileName) acc[p.fileName] = p;
          return acc;
        }, {});
      } catch (e) {
        console.warn('products.json fetch 실패, script fallback 사용 시도', e);
        const products = Array.isArray(window.__PRODUCTS_DATA__?.products) ? window.__PRODUCTS_DATA__.products : [];
        return products.reduce((acc, p) => {
          if (p?.fileName) acc[p.fileName] = p;
          return acc;
        }, {});
      }
    }

    function resolveProdFile() {
      try {
        const raw = new URLSearchParams(window.location.search).get('prod');
        const value = (raw || '').trim();
        if (!value) return DEFAULT_PROD_FILE;
        if (!/^[a-zA-Z0-9._-]+\.(jpg|jpeg|png|webp)$/i.test(value)) return DEFAULT_PROD_FILE;
        return value;
      } catch (_) {
        return DEFAULT_PROD_FILE;
      }
    }

    const selectedFile = resolveProdFile();

    async function initProductDetail() {
      const productMap = await loadProductMap();
      const prodData = productMap[selectedFile] || DEFAULT_PRODUCT_META;

      const nameInput = document.getElementById('nameInput');
      const brandInput = document.getElementById('brandInput');
      const priceInput = document.getElementById('priceInput');
      const pStatInput = document.getElementById('pStatInput');
      const thumbPreview = document.getElementById('thumbPreview');
      const fileSizeInput = document.getElementById('fileSizeInput');
      const uploadedAtInput = document.getElementById('uploadedAtInput');

      if (nameInput) nameInput.value = prodData.name || selectedFile;
      if (brandInput) brandInput.value = prodData.brand || '';
      if (priceInput) priceInput.value = prodData.price ?? 0;

      if (pStatInput) {
        const statusToValue = { '비활성': '0', '활성': '1', '품절': '2' };
        pStatInput.value = statusToValue[prodData.status] || '1';
      }

      if (thumbPreview) {
        thumbPreview.src = prodData.thumbUrl || '';
        thumbPreview.alt = (prodData.fileName || selectedFile || '').replace(/\.[^.]+$/, '');
      }

      if (fileSizeInput) fileSizeInput.value = prodData.size || '-';
      if (uploadedAtInput) uploadedAtInput.value = prodData.uploadedAt || '-';
    }

    initProductDetail();

    const thumbFileInput = document.getElementById('thumbFileInput');
    const thumbFileName = document.getElementById('thumbFileName');
    if (thumbFileInput) {
      thumbFileInput.addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        if (file) {
          thumbFileName.textContent = `\uc120\ud0dd \ud30c\uc77c: ${file.name}`;
          const reader = new FileReader();
          reader.onload = (ev) => { if (thumbPreview) thumbPreview.src = ev.target.result; };
          reader.readAsDataURL(file);
        } else {
          thumbFileName.textContent = '\ub4f1\ub85d\ub41c \ud30c\uc77c \uc5c6\uc74c';
        }
      });
    }

  </script>
</body>
</html>
