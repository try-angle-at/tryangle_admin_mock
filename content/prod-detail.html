<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>상품 관리</title>
  <link rel="stylesheet" href="../assets/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
  <style>
    .detail-form {
      padding: 12px;
      display: grid;
      gap: 12px;
    }
    .detail-field {
      display: grid;
      gap: 6px;
    }
    .detail-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }
    .detail-db-section {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 2px;
      display: grid;
      gap: 12px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand" style="display:flex;align-items:center;gap:8px;">
        <span class="icon">dashboard_customize</span>
        TryAngle Admin
      </div>
      <div class="nav-title">메인</div>
      <ul class="nav-list">
        <li><a href="../index.html"><span class="icon sm" style="margin-right:8px;">grid_view</span>대시보드</a></li>
      </ul>
      <div class="nav-title">데이터 관리</div>
      <ul class="nav-list">
        <li><a href="../realtime/realtime-list.html"><span class="icon sm" style="margin-right:8px;">analytics</span>실시간 로그 데이터 목록</a></li>
      </ul>
      <div class="nav-title">컨텐츠 관리</div>
      <ul class="nav-list">
        <li><a href="./ref-img-gallery.html"><span class="icon sm" style="margin-right:8px;">image</span>레퍼런스 이미지 관리</a></li>
        <li><a class="active" href="./prod-list.html"><span class="icon sm" style="margin-right:8px;">shopping_bag</span>상품 관리</a></li>
      </ul>
    </aside>

    <main class="main">
      <div class="page-head">
        <div>
          <div class="breadcrumb-head">
            <a href="./prod-list.html" class="breadcrumb-link">목록</a>
            <span class="breadcrumb-sep">|</span>
            <h1>상품 관리</h1>
          </div>
          <p>상품 메타데이터 관리 화면입니다.</p>
        </div>
        <div class="actions">
          <button class="btn danger" type="button"><span class="icon sm" style="margin-right:6px;">delete</span>삭제</button>
          <button class="btn primary"><span class="icon sm" style="margin-right:6px;">save</span>저장</button>
        </div>
      </div>

      <div class="preview" style="grid-template-columns:1fr;">
        <div class="panel">
          <div class="panel-head"><h2>상품 정보</h2></div>
          <div class="detail-form">
            <div class="detail-field">
              <label class="detail-label" for="nameInput">상품명</label>
              <input class="input full" id="nameInput" value="빈 사이즈 머플러 [베이지]">
            </div>
            <div class="detail-field">
              <label class="detail-label" for="descInput">상품 설명</label>
              <textarea class="input full" id="descInput" rows="3" style="resize:none;">소프트한 소재와 커다란 디자인으로 겨울 코디나 레이어드업에 활용하기 좋은 백상 자켓입니다.</textarea>
            </div>
            <div class="detail-field">
              <label class="detail-label" for="priceInput">가격</label>
              <input class="input full" id="priceInput" type="number" min="0" value="29900">
            </div>
            <div class="detail-field">
              <label class="detail-label" for="pStatInput">상태</label>
              <select class="input full" id="pStatInput">
                <option value="0">비활성</option>
                <option value="1" selected>활성</option>
                <option value="2">품절</option>
              </select>
            </div>

            <div class="detail-db-section">
              <div class="detail-field">
                <label class="detail-label">썸네일</label>
                <div style="display:flex; align-items:center; gap:10px;">
                  <div id="thumbPreviewWrap" style="width:72px;height:72px;border-radius:8px;overflow:hidden;background:#efefef;flex-shrink:0;">
                    <img id="thumbPreview" style="width:100%;height:100%;object-fit:cover;" src="" alt="썸네일">
                  </div>
                  <div style="display:flex;flex-direction:column;gap:6px;flex:1;">
                    <input class="input full" id="thumbFileInput" type="file" accept="image/*">
                    <div id="thumbFileName" style="font-size:12px;color:var(--muted);">&#xb4f1;&#xb85d;&#xb41c; 파일 없음</div>
                  </div>
                </div>
              </div>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                <div class="detail-field">
                  <label class="detail-label" for="fileSizeInput">파일 크기</label>
                  <input class="input full" id="fileSizeInput" readonly>
                </div>
                <div class="detail-field">
                  <label class="detail-label" for="uploadedAtInput">업로드 일시</label>
                  <input class="input full" id="uploadedAtInput" readonly>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script>
    const PROD_BASE_URL = 'https://pub-a309ad8a0a6e4a629ad982d710e35276.r2.dev/legacy/product/';
    const DEFAULT_PROD_FILE = '1623540_3_big.webp';
    const DEFAULT_STORAGE_META = { size: '-', uploadedAt: '-' };
    const PROD_META = {
      '1623540_3_big.webp': {
        name: '빅 사이즈 머플러 [베이지]',
        brand: '무신사 스탠다드',
        desc: '소프트한 소재와 커다란 디자인으로 겨울 코디나 레이어드업에 활용하기 좋습니다.',
        price: 29900,
        snapRef: '223012_ref.jpeg',
        size: '310.88 kB',
        uploadedAt: '2026년 05월 04일 23시 19분'
      },
      '550.jpeg': {
        name: '스웨이드 2-way 크로스백 데일리 오피스룩 겨울 보부상가방',
        brand: '베이직포인트oem',
        desc: '데일리한 오피스룩과 아울러지는 2-way 스웨이드 크로스백입니다.',
        price: 25080,
        snapRef: '223203_ref.jpeg',
        size: '26.17 kB',
        uploadedAt: '2026년 05월 04일 23시 20분'
      },
      'VO141-BLK_11.jpg': {
        name: '베디베로 닿테 안경테 VO141 BLK',
        brand: 'VEDI VERO',
        desc: '클래식한 라운드 는낌의 닿테 프레임 안경테입니다.',
        price: 99000,
        snapRef: '223054_ref.jpeg',
        size: '-',
        uploadedAt: '-'
      }
    };

    function resolveProdFile() {
      try {
        const raw = new URLSearchParams(window.location.search).get('prod');
        const value = (raw || '').trim();
        if (!value) return DEFAULT_PROD_FILE;
        if (!/^[a-zA-Z0-9._-]+\.(jpg|jpeg|png|webp)$/i.test(value)) return DEFAULT_PROD_FILE;
        return value;
      } catch (_) {
        return DEFAULT_PROD_FILE;
      }
    }

    const selectedFile = resolveProdFile();
    const prodData = PROD_META[selectedFile] || { name: selectedFile, brand: '-', desc: '-', price: 0, snapRef: '-', size: '-', uploadedAt: '-' };

    const previewImage = document.getElementById('detailPreviewImage');
    if (previewImage) {
      previewImage.src = `${PROD_BASE_URL}${selectedFile}`;
      previewImage.alt = selectedFile.replace(/\.[^.]+$/, '');
    }

    const nameInput = document.getElementById('nameInput');
    if (nameInput) nameInput.value = prodData.name;

    const descInput = document.getElementById('descInput');
    if (descInput) descInput.value = prodData.desc;

    const priceInput = document.getElementById('priceInput');
    if (priceInput) priceInput.value = prodData.price;

    const thumbPreview = document.getElementById('thumbPreview');
    if (thumbPreview) {
      thumbPreview.src = `${PROD_BASE_URL}${selectedFile}`;
      thumbPreview.alt = selectedFile.replace(/\.[^.]+$/, '');
    }

    const thumbFileInput = document.getElementById('thumbFileInput');
    const thumbFileName = document.getElementById('thumbFileName');
    if (thumbFileInput) {
      thumbFileInput.addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        if (file) {
          thumbFileName.textContent = `\uc120\ud0dd \ud30c\uc77c: ${file.name}`;
          const reader = new FileReader();
          reader.onload = (ev) => { if (thumbPreview) thumbPreview.src = ev.target.result; };
          reader.readAsDataURL(file);
        } else {
          thumbFileName.textContent = '\ub4f1\ub85d\ub41c \ud30c\uc77c \uc5c6\uc74c';
        }
      });
    }

    const fileSizeInput = document.getElementById('fileSizeInput');
    const uploadedAtInput = document.getElementById('uploadedAtInput');
    if (fileSizeInput) fileSizeInput.value = prodData.size;
    if (uploadedAtInput) uploadedAtInput.value = prodData.uploadedAt;
  </script>
</body>
</html>
