<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>레퍼런스 이미지 관리</title>
  <link rel="stylesheet" href="../assets/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0">
  <style>
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      padding: 14px;
    }
    .g-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .g-thumb {
      height: 150px;
      background: #efefef;
      overflow: hidden;
    }
    .g-meta { padding: 10px; }
    .g-title { font-weight: 600; font-size: 14px; margin-bottom: 6px; }
    .g-tags { color: var(--muted); font-size: 12px; margin-bottom: 8px; }
    .g-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand" style="display:flex;align-items:center;gap:8px;">
        <span class="icon">dashboard_customize</span>
        TryAngle Admin
      </div>
      <div class="nav-title">메인</div>
      <ul class="nav-list">
        <li><a href="../index.html"><span class="icon sm" style="margin-right:8px;">grid_view</span>대시보드</a></li>
      </ul>
      <div class="nav-title">데이터 관리</div>
      <ul class="nav-list">
        <li><a href="../realtime/realtime-list.html"><span class="icon sm" style="margin-right:8px;">analytics</span>실시간 로그 데이터 목록</a></li>
      </ul>
      <div class="nav-title">컨텐츠 관리</div>
      <ul class="nav-list">
        <li><a class="active" href="./ref-img-gallery.html"><span class="icon sm" style="margin-right:8px;">image</span>레퍼런스 이미지 관리</a></li>
        <li><a href="./prod-list.html"><span class="icon sm" style="margin-right:8px;">shopping_bag</span>상품 관리</a></li>
      </ul>
    </aside>

    <main class="main">
      <div class="page-head">
        <div>
          <h1>레퍼런스 이미지 관리</h1>
        </div>
        <button class="btn primary"><span class="icon sm" style="margin-right:6px;">add</span>이미지 등록</button>
      </div>

      <div class="toolbar" style="margin-bottom:16px;">
        <div class="toolbar-group" style="flex:1;">
          <input id="gallerySearchInput" class="input" placeholder="title, tag 검색" style="min-width:280px;">
        </div>
        <div class="toolbar-group">
          <button id="galleryResetBtn" class="btn" type="button">초기화</button>
          <button id="gallerySearchBtn" class="btn" type="button">검색</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <h2>레퍼런스 갤러리</h2>
        </div>
        <div id="galleryContainer" class="gallery"></div>
      </div>
    </main>
  </div>

  <script src="../assets/data/reference.json.js"></script>
  <script>
    const REFERENCE_JSON_PATH = '../assets/data/reference.json';
    let referenceItems = [];

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderGallery(items) {
      const container = document.getElementById('galleryContainer');
      if (!container) return;

      if (!items.length) {
        container.innerHTML = '<div style="padding:8px; color:var(--muted);">검색 결과가 없습니다.</div>';
        return;
      }

      container.innerHTML = items.map((item) => {
        const fileName = escapeHtml(item.fileName || '');
        const imageUrl = escapeHtml(item.url || '');
        const tags = Array.isArray(item.tags)
          ? item.tags.map((tag) => `#${escapeHtml(tag)}`).join(' ')
          : '';
        const detailHref = `./ref-img-detail.html?img=${encodeURIComponent(item.fileName || '')}`;

        return `
          <article class="g-item">
            <div class="g-thumb"><img class="thumb-cover" src="${imageUrl}" alt="${fileName}"></div>
            <div class="g-meta">
              <div class="g-title">${fileName}</div>
              <div class="g-tags">${tags}</div>
              <a class="g-link" href="${detailHref}"><span class="icon sm">open_in_new</span>상세 보기</a>
            </div>
          </article>
        `;
      }).join('');
    }

    function filterAndRender(query) {
      const normalized = (query || '').trim().toLowerCase();
      if (!normalized) {
        renderGallery(referenceItems);
        return;
      }

      const filtered = referenceItems.filter((item) => {
        const fileName = (item.fileName || '').toLowerCase();
        const title = (item.title || '').toLowerCase();
        const desc = (item.description || '').toLowerCase();
        const tags = Array.isArray(item.tags) ? item.tags.join(' ').toLowerCase() : '';
        const tagsText = (item.tagsText || '').toLowerCase();
        return fileName.includes(normalized)
          || title.includes(normalized)
          || desc.includes(normalized)
          || tags.includes(normalized)
          || tagsText.includes(normalized);
      });

      renderGallery(filtered);
    }

    async function initGallery() {
      const container = document.getElementById('galleryContainer');
      const searchInput = document.getElementById('gallerySearchInput');
      const resetBtn = document.getElementById('galleryResetBtn');
      const searchBtn = document.getElementById('gallerySearchBtn');
      if (container) {
        container.innerHTML = '<div style="padding:8px; color:var(--muted);">데이터를 불러오는 중...</div>';
      }

      try {
        const res = await fetch(REFERENCE_JSON_PATH, { cache: 'no-store' });
        if (!res.ok) throw new Error(`Failed to load reference.json: ${res.status}`);
        const json = await res.json();
        referenceItems = Array.isArray(json?.references) ? json.references : [];
        renderGallery(referenceItems);
      } catch (e) {
        console.warn('reference.json fetch 실패, script fallback 사용 시도', e);
        const fallback = window.__REFERENCE_DATA__;
        referenceItems = Array.isArray(fallback?.references) ? fallback.references : [];
        if (referenceItems.length) {
          renderGallery(referenceItems);
        } else if (container) {
          container.innerHTML = '<div style="padding:8px; color:var(--error);">데이터를 불러오지 못했습니다.</div>';
        }
      }

      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          filterAndRender(e.target.value);
        });

        searchInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            filterAndRender(searchInput.value);
          }
        });
      }

      if (searchBtn && searchInput) {
        searchBtn.addEventListener('click', () => {
          filterAndRender(searchInput.value);
        });
      }

      if (resetBtn && searchInput) {
        resetBtn.addEventListener('click', () => {
          searchInput.value = '';
          renderGallery(referenceItems);
        });
      }
    }

    initGallery();
  </script>
</body>
</html>
